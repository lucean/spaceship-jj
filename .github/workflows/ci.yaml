name: ci
on:
  push:
    branches:
      - main
      - +([0-9])?(.{+([0-9]),x}).x
  pull_request:

jobs:
  main:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6.0.2

      - name: 💤 Install Zsh
        run: |
          sudo apt-get update
          sudo apt-get install zsh shunit2 git

      - name: Prepare spaceship
        run: |
          mkdir -p "$HOME/.zsh"
          git clone --depth=1 https://github.com/spaceship-prompt/spaceship-prompt.git "$HOME/.zsh/spaceship"

      - name: 🖨 Print Zsh Version
        run: zsh --version

      - name: 🧪 Run Tests
        run: SPAECSHIP_ROOT=~/.zsh/spaceship ./tests/spaceship-jj.test.zsh

  release:
    name: Release
    needs: main
    if: ${{ github.repository == 'lucean/spaceship-jj' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6.0.2

      - name: 🚀 Release
        uses: cycjimmy/semantic-release-action@v2
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            semantic-release-license
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
